<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natsu World</title>
<link rel="stylesheet" href="styles.css">

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background: linear-gradient(180deg,#ffe6f0,#f7eaff);
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
background:rgba(255,255,255,0.9);
position:fixed;
top:0;
width:100%;
box-sizing:border-box;
}

main{
margin-top:70px;
padding:10px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
margin-bottom:15px;
}

.titulo{
color:#fd6698;
}
</style>
</head>

<body>

<header>
<div>
<img src="perfil.png" alt="perfil" width="40">
</div>

<div>
<img src="icon-call.png" width="20" alt="">
<img src="icon-video.png" width="20" alt="">
<img src="sonido-on.png" width="20" alt="">
</div>
</header>

<main>

<div class="card">
<h3>Natsu World</h3>
<p>¡Bienvenidos a mi app! 🎀</p>
<img src="fondo-default.jpg" alt="" style="width:100%;border-radius:10px;">
</div>

<h2 class="titulo">NatsuClips</h2>
<img src="pastel.png" width="40" alt="">

<h2 class="titulo">NatsuChats</h2>
<img src="comentario.png" width="40" alt="">

</main>

<audio id="audio-notificacion" src="notificacion.m4a"></audio>

<div id="modal" style="position:fixed;inset:0;background:black;color:white;display:flex;align-items:center;justify-content:center;">
<div style="background:white;color:black;padding:20px;border-radius:15px;text-align:center;">
<p>¿Eres mayor de edad?</p>
<button onclick="entrar()">Entrar</button>
</div>
</div>

<script>
function entrar(){
document.getElementById("modal").style.display="none";
}
</script>

<script src="js.js"></script>

</body>
</html>
