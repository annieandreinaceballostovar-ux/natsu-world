<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Natsu World 🎀</title>
    <link rel="stylesheet" href="Style.css">
    <style>
        :root { --rosa-natsu: #fd6698; --fondo-pastel: #fff5f7; }
        body { margin: 0; background-color: var(--fondo-pastel); font-family: 'Segoe UI', sans-serif; }
        
        /* Contenedor Principal estilo Feed */
        .feed-container { padding: 15px; margin-top: 60px; display: flex; flex-direction: column; gap: 20px; }

        /* La Card de Publicación */
        .natsu-post { 
            background: white; border-radius: 25px; padding: 15px; 
            box-shadow: 0 10px 20px rgba(253, 102, 152, 0.05);
            border: 1px solid #ffeef2; position: relative;
        }

        /* Foto con el MARCO perfecto */
        .foto-wrapper { position: relative; width: 100%; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        .foto-principal { width: 100%; display: block; border-radius: 15px; }
        .marco-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; object-fit: stretch;
        }

        /* Decoraciones en las esquinas */
        .deco-lazo { position: absolute; top: -10px; left: -10px; width: 45px; z-index: 10; }
        .deco-pastel { position: absolute; bottom: 60px; right: 5px; width: 35px; }

        /* Botones de Interacción */
        .footer-post { display: flex; gap: 15px; padding: 12px 5px 0; align-items: center; }
        .icon-action { width: 28px; transition: transform 0.2s; cursor: pointer; }
        .icon-action:active { transform: scale(1.3); }
    </style>
</head>
<body>

    <header style="position: fixed; top: 0; width: 100%; background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-sizing: border-box;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="perfil.png" style="width: 35px; height: 35px; border-radius: 50%;">
            <span style="color: var(--rosa-natsu); font-weight: bold;">Natsu World</span>
        </div>
        <img id="sonido-trigger" src="sonido_on.png" style="width: 25px; cursor: pointer;">
    </header>

    <div class="feed-container">
        <div class="natsu-post">
            <img src="lazo.png" class="deco-lazo">
            
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                <strong style="font-size: 14px; color: #333;">Annie Ceballos</strong>
                <img src="oso.png" style="width: 20px;">
            </div>

            <div class="foto-wrapper">
                <img src="fondo-default.jpg" class="foto-principal">
                <img src="marco.png" class="marco-overlay">
            </div>

            <img src="pastel.png" class="deco-pastel">

            <div class="footer-post">
                <img src="corazon.png" class="icon-action" id="like-btn">
                <img src="comentario.png" class="icon-action">
                <img src="enviar.png" class="icon-action" style="margin-left: auto; width: 22px;">
            </div>
        </div>
    </div>

    <audio id="notif-audio" src="notificacion.mp4a)"></audio>

    <script>
        const btn = document.getElementById('sonido-trigger');
        const audio = document.getElementById('notif-audio');
        btn.addEventListener('click', () => {
            audio.play().catch(() => alert("Toca primero cualquier parte de la pantalla"));
        });
    </script>
</body>
</html>
