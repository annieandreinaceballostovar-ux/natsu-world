<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Natsu World 🎀</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(255,255,255,0.7); backdrop-filter: blur(5px); position: fixed; top: 0; width: 100%; z-index: 10; box-sizing: border-box;">
        <div style="position: relative; width: 45px; height: 45px;">
            <img src="assets/images/perfil.png" style="width: 100%; border-radius: 50%; border: 2px solid #fff;">
            <img src="assets/frames/corazon.png" style="position: absolute; top: -5px; left: -5px; width: 55px; pointer-events: none;">
        </div>
        <div style="display: flex; gap: 15px; margin-right: 10px;">
            <img src="assets/icons/icon-call.png" style="width: 22px;">
            <img src="assets/icons/icon-video.png" style="width: 22px;">
            <img src="assets/icons/sonido-on.png" style="width: 22px;">
        </div>
    </header>

    <main style="margin-top: 80px; padding: 10px; padding-bottom: 100px; overflow-y: auto; height: calc(100vh - 80px);">

        <div class="publicacion-container">
            <img src="assets/frames/oso.png" class="osito-decoracion" alt="Oso Decorativo">
            
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <img src="assets/images/perfil.png" style="width: 40px; border-radius: 50%;">
                <div>
                    <span style="font-weight: bold; color: #333;">Annie Ceballos</span><br>
                    <span style="font-size: 12px; color: #777;">Hace 5 min</span>
                </div>
            </div>
            
            <p style="margin: 0; color: #555; font-size: 14px;">¡Bienvenidos a mi nueva red social, Natsu World! 🎀 Espero que les guste mucho. #Aesthetic #NatsuIA</p>
            
            <img src="assets/images/fondo-default.jpg" style="width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #ffeef2;">
        </div>

        <div class="seccion-titulo-container">
            <h2 class="seccion-titulo">NatsuClips</h2>
            <img src="assets/frames/pastel.png" class="titulo-frame" alt="Decoración">
        </div>
        <div style="text-align: center; color: #888; font-size: 14px;">(Aquí irían los videos cortos...)</div>

        <div class="seccion-titulo-container">
            <h2 class="seccion-titulo">NatsuChats</h2>
            <img src="assets/icons/comentario.png" class="titulo-frame" alt="Decoración">
        </div>
        <div style="text-align: center; color: #888; font-size: 14px;">(Aquí irían tus chats...)</div>

    </main>

    <div id="age-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100;">
        <div style="background: white; padding: 30px 20px; border-radius: 25px; text-align: center; position: relative; width: 85%; max-width: 320px;">
            <img src="assets/frames/oso.png" style="width: 70px; margin-bottom: 10px;">
            <h2 style="color: #fd6698; margin: 0; font-size: 1.2rem;">¡Hola, Annie! 🌸</h2>
            <p style="font-size: 13px; color: #555;">¿Eres mayor de edad para entrar?</p>
            <button id="btnEntrar" style="background: #fd6698; color: white; border: none; padding: 12px 0; width: 100%; border-radius: 15px; font-weight: bold; margin-top: 15px; cursor: pointer;">SÍ, SOY MAYOR</button>
            <img src="assets/frames/pastel.png" style="position: absolute; bottom: -10px; right: -10px; width: 55px;">
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
