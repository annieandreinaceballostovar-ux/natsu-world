<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Natsu World 🎀</title>

    <link rel="stylesheet" href="Style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="oso.png" type="image/png">
</head>
<body>
    
    <div id="app" class="app-container">
        <div class="osito-container">
            <img src="osito.gif" alt="Osito Natsu" class="osito-gif">
            <img src="osito-mini.png" alt="Mini Osito" class="osito-mini"> 
        </div>

        <div class="botones-container">
            <button id="btn-video">
                <img src="icon-video.png" alt="Video">
            </button>
            <button id="btn-sonido">
                <img src="sonido_on.png" alt="Sonido">
            </button>
            <button id="btn-subir">
                <img src="subir-video.png" alt="Subir Video">
            </button>
        </div>

        <img src="marco.png" alt="Marco" class="marco">
        <img src="corazon.png" alt="Corazón" class="corazon">

        <audio id="audio-notificacion" src="notificacion.mp4a" preload="auto"></audio>
        <audio id="audio-vibracion" src="vibracion.m4a" preload="auto"></audio>
    </div>

    <script src="js.js"></script>
    <script src="service-worker.js"></script>

    <script>
        // Lógica para que el botón de sonido funcione al tocarlo
        const btnSonido = document.getElementById('btn-sonido');
        const audio = document.getElementById('audio-notificacion');

        if(btnSonido && audio) {
            btnSonido.addEventListener('click', () => {
                audio.play().catch(e => console.log("Toca la pantalla primero para activar el audio"));
            });
        }

        // Registro del modo App (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
            .then(reg => console.log('Natsu World listo para instalar'));
        }
    </script>
</body>
</html>
