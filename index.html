<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Natsu World 🎀</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="app_style.css">
    
    <style>
        /* Estilo rápido para asegurar que no se vea nada antes de cargar */
        .hidden { display: none !important; }
        #scr_app { display: flex; flex-direction: column; height: 100vh; }
    </style>
</head>
<body>

    <div id="scr_login" class="login-screen">
        <div class="login-card">
            <img src="img_oso_logo.png" style="width: 85px; margin-bottom: 10px;">
            <h2 id="txt_welcome">Natsu World</h2>
            
            <p style="font-size: 13px; color: var(--natsu-rosa); margin-bottom: 5px;">Selecciona tu idioma:</p>
            <select id="sel_lang" onchange="translateApp()">
                <option value="es">Venezuela 🇻🇪 / España 🇪🇸</option>
                <option value="en">USA 🇺🇸 / English 🇬🇧</option>
                <option value="ko">Korea 🇰🇷 / 한국어</option>
            </select>

            <input type="text" id="in_name" placeholder="Tu nombre artístico o usuario">
            
            <p style="font-size: 12px; color: #888; margin-top: 10px;">Fecha de nacimiento (Solo 18+):</p>
            <input type="date" id="in_birth">
            
            <button class="btn-entrar" onclick="checkAccess()">Entrar al Mundo ✨</button>
            
            <p style="font-size: 10px; color: #bbb; margin-top: 15px;">Powered by Annie Andreina © 2026</p>
        </div>
    </div>

    <div id="scr_app" class="hidden">
        
        <header style="background: white; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: center;">
            <input type="text" placeholder="🔍 Buscar en Natsu World..." style="width: 90%; padding: 10px; border-radius: 20px; border: 1px solid #f0f0f0; background: #f9f9f9; outline: none; font-size: 14px;">
        </header>

        <main id="view_area" style="flex: 1; overflow-y: auto; background: #fff5f7;"></main>

        <nav class="nav-bar">
            <div class="nav-item" onclick="loadView('clips')">
                <img src="img_icon_video.png">
                <span>Clips</span>
            </div>
            
            <div class="nav-item" onclick="loadView('chats')">
                <img src="img_icon_enviar.png">
                <span>Natsuchats</span>
            </div>
            
            <div class="nav-item" onclick="loadView('feed')">
                <img src="img_oso_logo.png">
                <span>NatsuFeed</span>
            </div>
            
            <div class="nav-item" onclick="loadView('profile')">
                <img src="img_icon_perfil.png">
                <span>Perfil</span>
            </div>
        </nav>
        
    </div>

    <div id="heart_container"></div>

    <script src="app_logic.js"></script>

</body>
    </html>
